<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bookfinder</title>
    <style>
        :root {
            --primary: #00ff00;
            --bg: #000000;
            --card-bg: #000000;
            --text: #00ff00;
            --border: #00ff00;
        }

        body { 
            font-family: 'Courier New', Courier, monospace; 
            max-width: 900px; 
            margin: 0 auto; 
            padding: 15px; 
            background: var(--bg); 
            color: var(--text); 
            text-transform: uppercase;
        }

        /* Scanline Effect */
        body::before {
            content: " ";
            display: block;
            position: fixed;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            z-index: 1000;
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
        }

        h1, h3, h4 { color: var(--primary); margin-top: 0; letter-spacing: 2px; }
        h1 { border-bottom: 2px solid var(--primary); padding-bottom: 10px; margin-bottom: 20px; }

        .card { 
            background: var(--card-bg); 
            padding: 20px; 
            border: 2px solid var(--border); 
            margin-bottom: 20px; 
            position: relative;
        }

        .card::before {
            content: " [ PANEL ] ";
            position: absolute;
            top: -12px;
            left: 20px;
            background: var(--bg);
            padding: 0 5px;
            font-size: 12px;
        }

        .search-group { display: flex; flex-direction: column; gap: 15px; }
        @media (min-width: 600px) { .search-group { flex-direction: row; align-items: center; } }

        input { 
            padding: 12px; 
            border: 1px solid var(--border); 
            background: #000; 
            color: var(--primary); 
            font-family: inherit; 
            font-size: 16px;
            width: 100%;
            box-sizing: border-box;
            outline: none;
        }

        button { 
            padding: 12px 24px; 
            background: var(--primary); 
            color: black; 
            border: none; 
            cursor: pointer; 
            font-weight: bold; 
            font-size: 16px; 
            font-family: inherit;
            width: 100%;
        }
        button:hover { background: white; }
        button:disabled { background: #004400; color: #008800; cursor: not-allowed; }

        .author-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; margin-top: 15px; }
        .author-card { 
            border: 1px solid var(--border); 
            padding: 15px; 
            cursor: pointer; 
            background: #000;
        }
        .author-card:hover { background: #004400; border-color: white; }
        
        .author-header { display: flex; gap: 12px; align-items: flex-start; }
        .author-photo { 
            width: 80px; height: 110px; 
            filter: grayscale(1) sepia(1) hue-rotate(60deg) brightness(1.2);
            border: 1px solid var(--primary);
            object-fit: cover;
        }
        .author-info h4 { margin: 0; font-size: 18px; }
        .author-info p { margin: 4px 0; font-size: 13px; color: var(--text); }
        .author-bio { font-size: 13px; margin: 10px 0; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; line-height: 1.4; }
        .author-top-work { font-weight: bold; font-size: 12px; border-top: 1px dashed var(--border); padding-top: 8px; }

        .table-container { width: 100%; overflow-x: auto; border: 1px solid var(--border); margin-top: 10px; }
        table { width: 100%; border-collapse: collapse; min-width: 400px; }
        th { background: #004400; color: white; text-align: left; padding: 12px 8px; border-bottom: 2px solid var(--border); }
        td { padding: 12px 8px; border-bottom: 1px solid #222; }
        tr:hover { background: #001100; }

        .chk-col { width: 50px; text-align: center; }

        #log { 
            background: #000; 
            color: var(--primary); 
            padding: 15px; 
            height: 350px; 
            overflow-y: auto; 
            font-family: inherit;
            font-size: 14px; 
            border: 1px solid #333;
        }
        .log-entry { margin-bottom: 4px; display: flex; gap: 12px; align-items: flex-start; }
        .log-icon { flex-shrink: 0; font-weight: bold; }
        .log-msg { line-height: 1.2; word-break: break-all; }
        
        .progress-container { font-family: inherit; color: var(--primary); margin: 15px 0; font-size: 14px; font-weight: bold; }
        .progress-text { font-family: inherit; color: var(--primary); margin-bottom: 4px; }
        
        .settings-link { text-align: right; margin-bottom: 15px; }
        .settings-link button.link { 
            background: none; border: 1px solid var(--primary); color: var(--primary); 
            width: auto; padding: 5px 15px; font-size: 12px; cursor: pointer; font-family: inherit;
        }
        .settings-link button.link:hover { background: var(--primary); color: black; }

        .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid rgba(0,255,0,.3); border-radius: 50%; border-top-color: var(--primary); animation: spin 1s ease-in-out infinite; margin-right: 10px; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Mobile Adjustments */
        @media (max-width: 600px) {
            body { padding: 10px; }
            .card { padding: 15px; }
            button { padding: 15px; }
        }
    </style>
</head>
<body>
    <h1>SYSTEM::BOOKFINDER_V2.0</h1>
    <div class="settings-link">
        <form method="post" action="/logout" style="margin: 0;"><button type="submit" class="link">BYE</button></form>
    </div>

    <div class="card">
        <div class="search-group">
            <input type="text" id="author" placeholder="ENTER AUTHOR NAME" onkeyup="if(event.key==='Enter') search()">
            <button id="search-btn" onclick="search()">EXECUTE</button>
        </div>
        <input type="text" id="query" placeholder="FILTER TITLE (OPTIONAL)" style="margin-top:15px;" onkeyup="if(event.key==='Enter') search()">
    </div>

    <div id="author-select-card" class="card" style="display:none;">
        <h3>SELECT AUTHOR</h3>
        <div id="author-grid" class="author-grid"></div>
    </div>

    <div id="results-card" class="card" style="display:none;">
        <h3 id="author-title"></h3>
        <div class="table-container"><div id="results-list"></div></div>
        <div style="display: flex; gap: 12px; margin-top: 20px; flex-wrap: wrap;">
            <button id="download-btn" onclick="startDownload()">PULL SELECTED</button>
            <button id="stop-btn" onclick="stopJob()" style="background: #000; border: 1px solid #ff3b30; color: #ff3b30; display: none;">ABORT</button>
        </div>
    </div>

    <div id="log-card" class="card" style="display:none;">
        <h3>TERMINAL OUTPUT</h3>
        <div class="progress-text" id="progress-text">JOB: 0 / 0</div>
        <div class="progress-container">
            PROGRESS: <span id="progress-bar-ascii">[....................]</span> <span id="progress-pct">0%</span>
        </div>
        <div id="log"></div>
    </div>

    <script>
        let currentBooks = [], currentAuthor = "", logIndex = 0, currentJobId = null;

        async function apiFetch(url, options) {
            const res = await fetch(url, options);
            if (res.status === 401) {
                window.location.href = '/login';
                return new Promise(() => {});
            }
            return res;
        }

        async function search() {
            const a = document.getElementById('author').value; if(!a) return;
            const btn = document.getElementById('search-btn');
            btn.disabled = true; btn.innerHTML = '<span class="spinner"></span>Searching...';
            
            document.getElementById('author-select-card').style.display = 'none';
            document.getElementById('results-card').style.display = 'none';

            try {
                const res = await apiFetch(`/search?author=${encodeURIComponent(a)}`);
                const data = await res.json();
                if(data.error) return alert(data.error);
                
                const grid = document.getElementById('author-grid');
                grid.innerHTML = '';
                data.authors.forEach(auth => {
                    const card = document.createElement('div');
                    card.className = 'author-card';
                    card.onclick = () => selectAuthor(auth.id, auth.name);
                    card.innerHTML = `
                        <div class="author-header">
                            <img class="author-photo" src="${auth.photo_url || 'https://openlibrary.org/static/images/icons/avatar_author-lg.png'}" onerror="this.src='https://openlibrary.org/static/images/icons/avatar_author-lg.png'">
                            <div class="author-info">
                                <h4>${auth.name}</h4>
                                <p>${auth.birth_date || ''}</p>
                                <p>${auth.work_count} works</p>
                            </div>
                        </div>
                        <div class="author-bio">${auth.bio || 'No biography available.'}</div>
                        <div class="author-top-work">Notable: ${auth.top_work || 'N/A'}</div>
                    `;
                    grid.appendChild(card);
                });
                document.getElementById('author-select-card').style.display = 'block';
            } finally { btn.disabled = false; btn.innerText = 'Search'; }
        }

        async function selectAuthor(id, name) {
            document.getElementById('author-select-card').style.display = 'none';
            const btn = document.getElementById('search-btn');
            btn.disabled = true; btn.innerHTML = '<span class="spinner"></span>Fetching Bibliography...';

            try {
                const q = document.getElementById('query').value;
                const res = await apiFetch(`/author_books?author_id=${id}&author_name=${encodeURIComponent(name)}&query=${encodeURIComponent(q)}`);
                const data = await res.json();
                
                currentAuthor = data.author; currentBooks = data.books;
                document.getElementById('author-title').innerText = `${data.books.length} books for ${data.author}`;
                document.getElementById('results-card').style.display = 'block';
                
                let h = `<table><tr><th class="chk-col"><input type="checkbox" checked onclick="toggleAll(this)"></th><th>Year</th><th>Title</th></tr>`;
                data.books.forEach((b,i) => h+=`<tr><td class="chk-col"><input type="checkbox" class="book-chk" data-i="${i}" checked></td><td>${b.year||'-'}</td><td>${b.title}</td></tr>`);
                document.getElementById('results-list').innerHTML = h+'</table>';
            } finally { btn.disabled = false; btn.innerText = 'Search'; }
        }

        function toggleAll(m) { document.querySelectorAll('.book-chk').forEach(c => c.checked = m.checked); }

        let totalSelected = 0, booksDone = 0;

        function updateAsciiProgress() {
            if (totalSelected <= 0) return;
            const pct = Math.floor((booksDone / totalSelected) * 100);
            const blocks = Math.floor(pct / 5); // 20 segments
            const bar = "[" + "#".repeat(blocks) + ".".repeat(20 - blocks) + "]";
            document.getElementById('progress-bar-ascii').innerText = bar;
            document.getElementById('progress-pct').innerText = `${pct}%`;
            document.getElementById('progress-text').innerText = `JOB: ${booksDone} / ${totalSelected} RECORDS`;
        }

        async function startDownload() {
            const idxs = Array.from(document.querySelectorAll('.book-chk:checked')).map(c => parseInt(c.dataset.i));
            if(!idxs.length) return alert("Select books first.");
            
            totalSelected = idxs.length;
            booksDone = 0;
            updateAsciiProgress();
            document.getElementById('progress-text').style.display = 'block';

            document.getElementById('log-card').style.display = 'block';
            document.getElementById('download-btn').disabled = true;
            document.getElementById('stop-btn').style.display = 'block';
            document.getElementById('log').innerHTML = "";
            logIndex = 0;

            const res = await apiFetch('/start_job', { method: 'POST', headers: {'Content-Type':'application/json'},
                body: JSON.stringify({
                    author: currentAuthor,
                    books: idxs.map(i => currentBooks[i])
                })
            });
            const { job_id } = await res.json();
            currentJobId = job_id;
            connect(job_id);
        }

        async function stopJob() {
            if(!currentJobId) return;
            await apiFetch(`/stop_job/${currentJobId}`, { method: 'POST' });
        }

        function connect(job_id) {
            const ev = new EventSource(`/stream/${job_id}?last_idx=${logIndex}`);
            const logDiv = document.getElementById('log');
            
            ev.onmessage = (e) => {
                const msg = e.data;
                if (msg === ": heartbeat") return;
                
                const entry = document.createElement('div');
                entry.className = 'log-entry';
                
                let icon = "[*]", color = "#00ff00", weight = "normal";
                let hideEntry = false;
                
                if (msg.startsWith("SUCCESS:")) {
                    icon = "[DONE  ]"; color = "#00ff00"; weight = "bold";
                    booksDone++;
                } else if (msg.startsWith("FAILED:")) {
                    icon = "[ERROR ]"; color = "#ff3b30"; weight = "bold";
                    booksDone++;
                } else if (msg.startsWith("Searching for")) {
                    icon = "[SEARCH]"; color = "#5ac8fa";
                } else if (msg.includes("download queue")) {
                    icon = "[QUEUE ]"; color = "#ffcc00";
                } else if (msg.includes("mirror")) {
                    icon = "[MIRROR]"; color = "#5856d6";
                } else if (msg.startsWith("STOPPING") || msg === "JOB_CANCELLED_BY_USER") {
                    icon = "[CANCEL]"; color = "#ff9500";
                } else if (msg === "JOB_COMPLETE" || msg.startsWith("Initializing") || msg.startsWith("Added to")) {
                    icon = "[SYSTEM]"; color = "#8e8e93";
                } else {
                    hideEntry = true;
                }

                if (hideEntry) return;
                updateAsciiProgress();

                entry.innerHTML = `<span class="log-icon">${icon}</span><span class="log-msg" style="color:${color}; font-weight:${weight}">${msg}</span>`;
                logDiv.appendChild(entry);
                logDiv.scrollTop = logDiv.scrollHeight;
                logIndex++;
                
                if(msg === "JOB_COMPLETE") {
                    ev.close();
                    document.getElementById('download-btn').disabled = false;
                    document.getElementById('stop-btn').style.display = 'none';
                    currentJobId = null;
                }
            };
            ev.onerror = () => { ev.close(); setTimeout(() => connect(job_id), 2000); };
        }
    </script>
</body>
</html>
